name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spacedata
          POSTGRES_PASSWORD: spacedata_dev
          POSTGRES_DB: spacedata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spacedata"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://spacedata:spacedata_dev@localhost:5432/spacedata_test
          DATABASE_URL: postgresql://spacedata:spacedata_dev@localhost:5432/spacedata_test
        run: python -m pytest tests/ -v
